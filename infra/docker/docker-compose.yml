version: '3.8'
services:
  api:
    build: ../../apps/api
    env_file:
      - ../../apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/api/marianas.db:/app/marianas.db
    restart: unless-stopped

  web:
    build: ../../apps/web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
