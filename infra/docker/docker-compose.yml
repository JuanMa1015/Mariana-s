services:
  api:
    build: ../../apps/api
    env_file:
      - ../../apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - marianas_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    build: ../../apps/web
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  marianas_data:
