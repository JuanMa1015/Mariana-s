name: Sync Procesos Judiciales (Lote)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.API_URL }}" ]; then
            echo "ERROR: Repository secret API_URL is not set." >&2
            exit 1
          fi
          if [ -z "${{ secrets.API_TOKEN }}" ]; then
            echo "ERROR: Repository secret API_TOKEN is not set." >&2
            exit 1
          fi

      - name: Wake up server
        run: |
          echo "Esperando a que el servidor responda..."
          for i in $(seq 1 12); do
            if curl -fsS "${{ secrets.API_URL }}/health" > /dev/null 2>&1; then
              echo "Servidor listo"
              exit 0
            fi
            echo "Intento $i/12 - aun no responde, esperando 10s..."
            sleep 10
          done
          echo "El servidor no respondio a tiempo"
          exit 1

      - name: Sync lote
        env:
          API_URL: ${{ secrets.API_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "Sincronizando lote de 25 radicados..."
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "${API_URL}/procesos/sync-lote" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            --max-time 600)

          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error HTTP $HTTP_CODE: $BODY"
            exit 1
          fi

          echo ""
          echo "$BODY" | python3 << 'PYEOF'
          import sys, json
          d = json.load(sys.stdin)
          u = d.get('usuario_sincronizado', '?')
          t = d.get('total_consultados', 0)
          n = d.get('nuevos', 0)
          a = d.get('actualizados', 0)
          e = len(d.get('emails_enviados', []))
          err = d.get('radicados_error_consulta', [])
          print(f'Usuario: {u}')
          print(f'Consultados: {t} | Nuevos: {n} | Actualizados: {a} | Notificaciones: {e} | Errores: {len(err)}')
          for er in err:
              print(f'  - {er.get("radicado", "?")}: {er.get("error", "?")}')
          PYEOF
          echo ""
          echo "Sync lote completado"
