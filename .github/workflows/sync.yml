name: Sync Procesos Judiciales

on:
  schedule:
    - cron: '0 11,17,23,5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.API_URL }}" ]; then
            echo "ERROR: Repository secret API_URL is not set. Add it in Settings -> Secrets -> Actions." >&2
            exit 1
          fi
          if [ -z "${{ secrets.API_TOKEN }}" ]; then
            echo "ERROR: Repository secret API_TOKEN is not set. Add it in Settings -> Secrets -> Actions." >&2
            exit 1
          fi

      - name: Wake up server
        run: |
          echo "⏳ Esperando a que el servidor responda..."
          for i in {1..12}; do
            if curl -fsS "${{ secrets.API_URL }}/health"; then
              echo "✅ Servidor listo"
              exit 0
            fi
            echo "  Intento $i/12 — aún no responde, esperando 10s..."
            sleep 10
          done
          echo "❌ El servidor no respondió a tiempo"
          exit 1

      - name: Trigger sync (async)
        id: sync
        run: |
          echo "🔄 Disparando sincronización asíncrona..."
          RESULT=$(curl -s -X POST "${{ secrets.API_URL }}/procesos/sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}")

          echo "Respuesta: $RESULT"
          echo "result=$RESULT" >> $GITHUB_OUTPUT

          TASK_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('task_id',''))" 2>/dev/null || echo "")
          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")

          echo ""
          echo "============= SINCRONIZACION DISPARADA ============="
          echo "  Task ID:    $TASK_ID"
          echo "  Status:     $STATUS"
          echo "  La sincronización continúa en segundo plano."
          echo "====================================================="

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ La sincronización falló."
          echo "Revisa los logs del workflow para más detalles."
