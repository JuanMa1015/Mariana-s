name: Sync Procesos Judiciales

on:
  schedule:
    - cron: '0 11,17,23,5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.API_URL }}" ]; then
            echo "ERROR: Repository secret API_URL is not set. Add it in Settings -> Secrets -> Actions." >&2
            exit 1
          fi
          if [ -z "${{ secrets.API_TOKEN }}" ]; then
            echo "ERROR: Repository secret API_TOKEN is not set. Add it in Settings -> Secrets -> Actions." >&2
            exit 1
          fi

      - name: Wake up server
        run: |
          for i in {1..24}; do
            if curl -fsS "${{ secrets.API_URL }}/health"; then
              exit 0
            fi
            sleep 5
          done
          echo "API did not become ready in time"
          exit 1

      - name: Trigger sync
        run: |
          curl -X POST "${{ secrets.API_URL }}/procesos/sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            --fail \
            --retry 3 \
            --retry-delay 15
