name: Sync Procesos Judiciales

on:
  schedule:
    - cron: '0 11,17,23,5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.API_URL }}" ]; then
            echo "ERROR: Repository secret API_URL is not set. Add it in Settings -> Secrets -> Actions." >&2
            exit 1
          fi
          if [ -z "${{ secrets.API_TOKEN }}" ]; then
            echo "ERROR: Repository secret API_TOKEN is not set. Add it in Settings -> Secrets -> Actions." >&2
            exit 1
          fi

      - name: Wake up server
        run: |
          echo "⏳ Esperando a que el servidor responda..."
          for i in {1..12}; do
            if curl -fsS "${{ secrets.API_URL }}/health"; then
              echo "✅ Servidor listo"
              exit 0
            fi
            echo "  Intento $i/12 — aún no responde, esperando 10s..."
            sleep 10
          done
          echo "❌ El servidor no respondió a tiempo"
          exit 1

      - name: Trigger sync async and wait for result
        id: sync
        env:
          API_URL: ${{ secrets.API_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "🔄 Disparando sincronización asíncrona..."

          # 1) Disparar el sync
          RESULT=$(curl -s -X POST "${API_URL}/procesos/sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${API_TOKEN}")

          TASK_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('task_id',''))" 2>/dev/null || echo "")
          if [ -z "$TASK_ID" ]; then
            echo "❌ Error al disparar sync: $RESULT"
            exit 1
          fi
          echo "✅ Tarea disparada — ID: $TASK_ID"

          # 2) Hacer polling hasta que termine
          echo ""
          echo "⏳ Esperando resultado..."
          INTERVALO=10
          MAX_INTENTOS=$(( 60 * 60 / INTERVALO ))  # ~60 min máximo
          for i in $(seq 1 $MAX_INTENTOS); do
            sleep $INTERVALO
            STATUS_RESP=$(curl -s "${API_URL}/procesos/sync/${TASK_ID}")
            STATUS=$(echo "$STATUS_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")

            if [ "$STATUS" = "completed" ]; then
              echo ""
              echo "✅ Sincronización completada"
              echo ""
              echo "$STATUS_RESP" | python3 -c "
import sys, json
data = json.load(sys.stdin)
r = data.get('result', {})
print('============= RESUMEN DE SINCRONIZACION =============')
print(f'  Consultados:    {r.get(\"total_consultados\", 0)}')
print(f'  Nuevos:         {r.get(\"nuevos\", 0)}')
print(f'  Actualizados:   {r.get(\"actualizados\", 0)}')
print(f'  Notificaciones: {len(r.get(\"emails_enviados\", []))}')
print(f'  Errores:        {len(r.get(\"radicados_error_consulta\", []))}')
print('=====================================================')
if r.get('emails_enviados'):
    print(f'📧 Se enviaron {len(r[\"emails_enviados\"])} notificaciones por correo.')
if r.get('radicados_error_consulta'):
    for e in r['radicados_error_consulta']:
        print(f'⚠️  {e[\"radicado\"]}: {e[\"error\"][:80]}')
" 2>/dev/null || echo "$STATUS_RESP"
              exit 0
            fi

            if [ "$STATUS" = "failed" ]; then
              echo ""
              echo "❌ Sincronización falló"
              echo "$STATUS_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Error: {d.get(\"error\",\"desconocido\")}')" 2>/dev/null
              exit 1
            fi

            # Mostrar progreso cada 30s
            if [ $((i % 3)) -eq 0 ]; then
              echo "  ...esperando, minuto $(( i * INTERVALO / 60 ))"
            fi
          done

          echo "❌ Timeout: la sincronización no terminó en 60 minutos"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ La sincronización falló."
          echo "Revisa los logs del workflow para más detalles."
