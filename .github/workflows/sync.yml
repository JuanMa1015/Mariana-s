name: Sync Procesos Judiciales

on:
  schedule:
    - cron: '0 11,17,23,5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up server
        run: |
          curl "${{ secrets.API_URL }}/health" || true
          sleep 30

      - name: Trigger sync
        run: |
          curl -X POST "${{ secrets.API_URL }}/procesos/sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" \
            --fail \
            --retry 3 \
            --retry-delay 15
